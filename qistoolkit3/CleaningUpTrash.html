<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>清理垃圾 · 齐的工具包3</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/index_style.css" />
    <link rel="stylesheet" href="./css/qistoolkit3-page.css" />
    <link rel="stylesheet" href="./css/qistoolkit3-8card.css" />
    <link rel="stylesheet" href="./css/cleaning-trash.css" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <script src="/js/config.js"></script>
</head>
<body>
    <theme-button value="dark" id="btn" size="3"></theme-button>

    <header>
        <h1>齐的工具包3 <span class="version-badge" id="versionBadge">#</span></h1>
        <nav>
            <ul>
                <li><a href="/index.html">首页</a></li>
                <li><a href="/about.html">关于我</a></li>
                <li><a href="/contact.html">联系我</a></li>
                <li><a href="./index.html">返回专区</a></li>
            </ul>
        </nav>
    </header>

    <main class="toolkit-special-page cleaning-main">
        <h2>
            <a href="./index.html" style="text-decoration: none;">🧹 清理垃圾</a>
        </h2>

        <!-- ====== 特殊选项卡片 ====== -->
        <div class="cleaning-options">
            <div class="option-card">
                <div class="option-icon">🔒</div>
                <div class="option-content">
                    <h4>关闭有关程序</h4>
                    <p>尝试 <strong>自动杀死</strong> 正在占用待清理文件的程序，避免清理失败或权限冲突。因此，谨慎开启，可能会导致 <strong>工作未保存！</strong></p>
                    <span class="option-tag">谨慎开启</span>
                </div>
            </div>
            <div class="option-card">
                <div class="option-icon">👤</div>
                <div class="option-content">
                    <h4>用户兼容模式</h4>
                    <p>以非当前用户的视角进行清理，可绕过部分权限限制，适用于多用户环境或系统级清理。<strong>System权限模式下必须开启。</strong></p>
                    <span class="option-tag">高级选项</span>
                </div>
            </div>
        </div>

        <!-- ====== 统计信息 ====== -->
        <div class="cleaning-stats">
            <span class="stat-item">📂 共 <strong id="totalCount">0</strong> 个扫描项目</span>
            <span class="stat-item">📁 涵盖 <strong id="categoryCount">0</strong> 个分类</span>
        </div>

        <!-- ====== 垃圾分类列表 ====== -->
        <div class="cleaning-list-container" id="cleaningList">
            <!-- 由 JavaScript 动态渲染 -->
        </div>

        <!-- ====== 辅助信息 ====== -->
        <div class="toolkit-legal-bar cleaning-legal">
            <p>
                <span style="color: #8bc34a;">💡 本页展示所有可清理的垃圾项目</span>
            </p>
            <p style="margin-top: 6px; font-size: 0.85rem; opacity: 0.6;">
                ⚠️ 部分项目涉及系统目录，请谨慎操作
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2025-<span id="year"></span> 齐. 保留所有权利。</p>
        <script>
            document.getElementById('year').textContent = new Date().getFullYear();
            document.addEventListener('DOMContentLoaded', function() {
                const versionBadge = document.getElementById('versionBadge');
                if (versionBadge && typeof APP_CONFIG !== 'undefined') {
                    versionBadge.textContent = APP_CONFIG.version;
                }
            });
        </script>
    </footer>

    <script src="./js/cleaning-trash.js"></script>
</body>
</html>
