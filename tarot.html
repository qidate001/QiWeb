<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔮 塔罗占卜</title>
    <link rel="stylesheet" href="/css/tarot.css" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    </script>
</head>

<body>
    <div class="app-container">

        <!-- ===== 头部 ===== -->
        <header class="app-header">
            <h1>🔮 塔罗占卜</h1>
            <p class="subtitle">解读由LLM随机生成，不具备科学依据，不构成任何建议。所有解读请勿当真，请以现实理性判断为准。使用即代表您已阅读并同意。</p>
        </header>

        <!-- ===== 主体：左右布局 ===== -->
        <div class="main-layout">

            <!-- ===== 左侧面板 ===== -->
            <aside class="sidebar">
                <!-- 牌阵选择 -->
                <div class="panel-section">
                    <h3>📐 选择牌阵</h3>
                    <div class="spread-options" id="spreadOptions">
                        <!-- 由 JS 动态生成 -->
                    </div>
                </div>

                <!-- 分隔线 -->
                <div class="divider"></div>

                <!-- 用户输入 -->
                <div class="panel-section">
                    <h3>✍️ 你的问题</h3>
                    <textarea id="questionInput" rows="3" placeholder="输入你想探索的问题或意图…（选填）"></textarea>
                </div>
                
                <button class="btn btn-primary btn-draw" id="drawBtn" onclick="handleDraw()">
                    ✨ 抽牌
                </button>
                <button class="btn btn-reset" onclick="resetAll()">
                    🔄 重置
                </button>
                
                <!-- 页脚信息（左侧底部） -->
                <div class="sidebar-footer">
                    <p><a href="/docs/tarot.html" target="_blank">📜 完整免责声明（点击查看）</a></p>
                    <!-- <p><a href="/docs/tarot.html" target="_blank">📄 免责声明</a></p> -->
                </div>
            </aside>

            <!-- ===== 右侧主区域 ===== -->
            <main class="main-content">

                <!-- 牌阵展示区 -->
                <div class="spread-area" id="spreadArea">
                    <div class="placeholder-text">🃏 选择牌阵后点击「抽牌」</div>
                </div>

                <!-- 解读区 -->
                <div class="reading-result" id="readingResult">
                    <p class="placeholder-text">✨ 解读将在这里呈现…</p>
                </div>

            </main>
        </div>

    </div>

    <script src="/js/tarot_config.js"></script>
    <script src="/js/tarot.js"></script>
    <script>
        // ============================================
        // 页面加载后的额外初始化（分享检测）
        // ============================================
        (function() {
            // 检测 URL 中的分享码参数
            const urlParams = new URLSearchParams(window.location.search);
            const shareCodeFromUrl = urlParams.get('share_code');

            if (shareCodeFromUrl) {
                // 进入分享查看模式
                console.log(`🔗 正在加载分享记录: ${shareCodeFromUrl}`);
                
                // 等待 tarot.js 完全加载后再执行
                // 因为 loadSharedReading 函数在 tarot.js 中定义
                if (typeof loadSharedReading === 'function') {
                    loadSharedReading(shareCodeFromUrl);
                } else {
                    // 如果 tarot.js 还没加载完，等待一下
                    window.addEventListener('load', function() {
                        if (typeof loadSharedReading === 'function') {
                            loadSharedReading(shareCodeFromUrl);
                        } else {
                            console.error('❌ loadSharedReading 函数未找到');
                        }
                    });
                }

                // 隐藏操作按钮，进入只读模式
                const drawBtn = document.getElementById('drawBtn');
                const resetBtn = document.querySelector('.btn-reset');
                const questionInput = document.getElementById('questionInput');
                
                if (drawBtn) drawBtn.style.display = 'none';
                if (resetBtn) resetBtn.style.display = 'none';
                if (questionInput) {
                    questionInput.disabled = true;
                    questionInput.placeholder = '📖 正在查看历史占卜...';
                }
            }
        })();
    </script>
</body>

</html>
