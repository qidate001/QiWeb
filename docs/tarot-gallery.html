<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🃏 塔罗牌图鉴</title>
    <link rel="stylesheet" href="/css/tarot.css" />
    <link rel="stylesheet" href="/css/tarot-gallery.css" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />

<body>

    <!-- ===== 顶部导航 ===== -->
    <div class="gallery-header">
        <h1>🃏 塔罗牌图鉴</h1>
        <span class="sub-info" id="cardCount">共 78 张牌</span>
    </div>

    <!-- ===== 牌面展示区 ===== -->
    <div class="gallery-grid" id="cardGrid"></div>

    <!-- 引入你原来的配置数据 -->
    <script src="/js/tarot_config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const grid = document.getElementById('cardGrid');
            const deck = TAROT_DECK;
            const imgBase = CONFIG.IMG_BASE || '/images/tarot_cards/';
            const backImg = CONFIG.BACK_IMG || '/images/tarot_cards/_.png';

            // 遍历所有牌进行渲染
            deck.forEach((card) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-slot-wrapper';

                // 单击整张牌翻转
                wrapper.onclick = function () {
                    this.querySelector('.card-slot').classList.toggle('flipped');
                };

                const imgSrc = `${imgBase}${card.id}.png`;

                // 默认加上 "flipped" 类，让牌一出来就显示正面的艺术图
                wrapper.innerHTML = `
                    <div class="card-slot flipped">
                        <div class="card-inner">
                            <div class="card-back">
                                <img src="${backImg}" alt="牌背" loading="lazy">
                            </div>
                            <div class="card-front" data-name="${card.name}">
                                <img src="${imgSrc}" alt="${card.name}" loading="lazy">
                            </div>
                        </div>
                    </div>
                    <div class="card-label">
                        ${card.name} <span class="en-name">${card.nameEn}</span>
                    </div>
                `;
                grid.appendChild(wrapper);
            });

            // 更新张数统计
            document.getElementById('cardCount').textContent = `共 ${deck.length} 张牌`;
        });
    </script>
</body>

</html>
