<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · 齐的网站</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/index_style.css" />
    <link rel="stylesheet" href="/css/404.css" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
</head>

<body>
    <header>
        <!-- <h1>404</h1> -->
        <nav>
            <ul>
                <li><a href="/index.html">首页</a></li>
                <li><a href="/about.html">关于我</a></li>
                <li><a href="/contact.html">联系我</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- 404 主视觉区 -->
        <div class="error-hero">
            <div class="error-glitch">
                <span class="glitch-char">4</span>
                <span class="glitch-char">0</span>
                <span class="glitch-char">4</span>
            </div>
            <p class="error-sub">页面似乎已迷失……</p>
        </div>

        <!-- 双卡片建议区 -->
        <div class="game-buttons-container error-suggestions">
            <!-- 返回首页卡片 -->
            <a href="/index.html" class="game-card card-online error-card">
                <div class="card-glow"></div>
                <div class="card-icon">🏠</div>
                <div class="card-content">
                    <h3 class="card-title">回到首页</h3>
                    <p class="card-sub">重新规划路线</p>
                </div>
                <div class="card-arrow">➜</div>
            </a>

            <!-- 联系我卡片 -->
            <a href="/contact.html" class="game-card card-story error-card">
                <div class="card-glow"></div>
                <div class="card-icon">📬</div>
                <div class="card-content">
                    <h3 class="card-title">联系我</h3>
                    <p class="card-sub">报告失效链接</p>
                </div>
                <div class="card-arrow">➜</div>
            </a>
        </div>

        <!-- 附加信息 -->
        <div class="error-footnote">
            <p>⚡ 你可能是从某个旧链接或输入错误地址来到这里。</p>
            <p>🛠️ 如果这是工具包或载具页面的失效链接，请到 GitHub Issues 反馈。</p>
        </div>
    </main>

    <!-- 页脚 (与全站一致) -->
    <footer>
        <p>&copy; 2025-<span id="year"></span> 齐. 保留所有权利。</p>
        <script>
            document.getElementById('year').textContent = new Date().getFullYear();
        </script>
    </footer>
</body>

</html>
