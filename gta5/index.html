  <script>
    // 加载统计数据
    fetch('data/vehicles.json')
      .then(response => response.json())
      .then(data => {
        const vehicles = data.vehicles;
        let totalVariants = 0;
        let lastDate = '';
        
        vehicles.forEach(vehicle => {
          totalVariants += vehicle.variants.length;
          if (!lastDate || vehicle.update_date > lastDate) {
            lastDate = vehicle.update_date;
          }
        });
        
        const stats = document.querySelectorAll('.stat-number');
        if (stats[0]) stats[0].textContent = vehicles.length;
        if (stats[1]) stats[1].textContent = totalVariants;
        if (stats[2]) stats[2].textContent = lastDate;
      })
      .catch(error => {
        console.error('加载统计信息失败:', error);
      });
  </script>
